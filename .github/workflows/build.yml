name: 'Build and deploy'

permissions:
  actions: write
  attestations: none
  checks: write
  contents: write
  deployments: none
  id-token: write
  issues: none
  discussions: none
  packages: none
  pages: write
  pull-requests: none
  repository-projects: write
  security-events: none
  statuses: none

on:
  schedule:
    # Run hourly at xx:05.
    - cron: '05 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Update last known good versions per channel
        run: |
          git config user.name 'Chrome for Testing bot'
          git config user.email 'mathias+cft@chromium.org'
          git add data
          git commit data -m 'Update latest available version numbers' || true
          git push

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: dist
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          single-commit: true
          git-config-name: Chrome for Testing bot
          git-config-email: mathias+cft@chromium.org
